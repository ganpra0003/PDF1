<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 페이지 분리 도구</title>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF.js for Preview -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- pdf-lib for Splitting -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --surface-color: #ffffff;
            --border-color: #e5e7eb;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --selected-ring: #818cf8;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --text-color: #f9fafb;
            --surface-color: #1f2937;
            --border-color: #374151;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --selected-ring: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .icon-btn {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--border-color);
        }

        .upload-area {
            background: var(--surface-color);
            border: 2px dashed var(--border-color);
            border-radius: 1rem;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .upload-area:hover {
            border-color: var(--primary);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .controls {
            display: none;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            background: var(--surface-color);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .page-card {
            background: var(--surface-color);
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .page-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--selected-ring) opacity(0.5);
        }

        .page-number {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
        }

        .check-icon {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            color: var(--primary);
            background: white;
            border-radius: 50%;
            display: none;
        }

        .page-card.selected .check-icon {
            display: block;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <i data-lucide="file-split"></i>
            PDF 페이지 분리
        </div>
        <button class="icon-btn" id="themeToggle" title="테마 변경">
            <i data-lucide="moon" id="themeIcon"></i>
        </button>
    </header>

    <main>
        <label class="upload-area" id="dropZone">
            <i data-lucide="upload-cloud" style="width: 48px; height: 48px; margin-bottom: 1rem; color: var(--primary);"></i>
            <h3>PDF 파일을 선택하거나 여기로 드래그하세요</h3>
            <p style="margin-top: 0.5rem; color: #6b7280; font-size: 0.875rem;">(파일은 서버로 전송되지 않고 브라우저에서 안전하게 처리됩니다)</p>
            <input type="file" id="fileInput" accept="application/pdf">
        </label>

        <div id="loading">PDF를 불러오는 중입니다...</div>

        <div class="controls" id="controls">
            <div>
                <span id="selectionInfo">선택된 페이지: 0장</span>
            </div>
            <button class="btn-primary" id="extractBtn" disabled>
                <i data-lucide="download"></i>
                선택한 페이지 추출하기
            </button>
        </div>

        <div class="preview-grid" id="previewGrid"></div>
    </main>

    <script>
        // PDF.js 워커 설정
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // DOM 요소
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('previewGrid');
        const controls = document.getElementById('controls');
        const extractBtn = document.getElementById('extractBtn');
        const selectionInfo = document.getElementById('selectionInfo');
        const loading = document.getElementById('loading');
        
        // 상태 변수
        let currentPdfBytes = null;
        let selectedPages = new Set();
        let pdfDocForPreview = null;

        // 초기 아이콘 렌더링
        lucide.createIcons();

        // 테마 토글 (라이트/다크 모드)
        let isDarkMode = false;
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            themeIcon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
        });

        // 파일 선택 이벤트
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                await loadPDF(file);
            }
        });

        // PDF 로드 및 미리보기 생성
        async function loadPDF(file) {
            try {
                loading.style.display = 'block';
                previewGrid.innerHTML = '';
                controls.style.display = 'none';
                selectedPages.clear();
                updateSelectionInfo();

                const arrayBuffer = await file.arrayBuffer();
                currentPdfBytes = arrayBuffer;

                // PDF.js로 렌더링 준비
                pdfDocForPreview = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const numPages = pdfDocForPreview.numPages;

                for (let i = 1; i <= numPages; i++) {
                    await renderPage(i);
                }

                loading.style.display = 'none';
                controls.style.display = 'flex';
                lucide.createIcons();
            } catch (error) {
                console.error("PDF 로드 오류:", error);
                alert("PDF 파일을 불러오는데 실패했습니다.");
                loading.style.display = 'none';
            }
        }

        // 개별 페이지 렌더링
        async function renderPage(pageNum) {
            const page = await pdfDocForPreview.getPage(pageNum);
            
            // 해상도 스케일링 (미리보기이므로 적당한 크기로)
            const viewport = page.getViewport({ scale: 0.5 });
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = {
                canvasContext: context,
                viewport: viewport
            };
            
            await page.render(renderContext).promise;

            // UI 요소 생성
            const card = document.createElement('div');
            card.className = 'page-card';
            card.dataset.pageIndex = pageNum - 1; // pdf-lib은 0부터 시작
            
            const checkIcon = document.createElement('i');
            checkIcon.setAttribute('data-lucide', 'check-circle-2');
            checkIcon.className = 'check-icon';

            const pageLabel = document.createElement('div');
            pageLabel.className = 'page-number';
            pageLabel.textContent = `${pageNum}쪽`;

            card.appendChild(checkIcon);
            card.appendChild(canvas);
            card.appendChild(pageLabel);

            // 클릭 이벤트 (페이지 선택/해제)
            card.addEventListener('click', () => {
                const index = parseInt(card.dataset.pageIndex);
                if (selectedPages.has(index)) {
                    selectedPages.delete(index);
                    card.classList.remove('selected');
                } else {
                    selectedPages.add(index);
                    card.classList.add('selected');
                }
                updateSelectionInfo();
            });

            previewGrid.appendChild(card);
        }

        // 선택 정보 업데이트
        function updateSelectionInfo() {
            selectionInfo.textContent = `선택된 페이지: ${selectedPages.size}장`;
            extractBtn.disabled = selectedPages.size === 0;
        }

        // PDF 분리 및 다운로드 (pdf-lib 사용)
        extractBtn.addEventListener('click', async () => {
            if (selectedPages.size === 0 || !currentPdfBytes) return;

            try {
                const { PDFDocument } = PDFLib;
                
                // 원본 PDF 로드
                const originalPdf = await PDFDocument.load(currentPdfBytes);
                // 새 PDF 생성
                const newPdf = await PDFDocument.create();

                // 선택한 페이지 인덱스를 배열로 변환 후 오름차순 정렬
                const pagesToExtract = Array.from(selectedPages).sort((a, b) => a - b);
                
                // 원본에서 페이지 복사
                const copiedPages = await newPdf.copyPages(originalPdf, pagesToExtract);
                
                // 새 PDF에 복사한 페이지 추가
                copiedPages.forEach((page) => newPdf.addPage(page));

                // 새 PDF 저장
                const pdfBytes = await newPdf.save();
                
                // 다운로드 트리거
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'extracted_pages.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error("PDF 추출 오류:", error);
                alert("PDF를 분리하는 중 오류가 발생했습니다.");
            }
        });

    </script>
</body>
</html>
